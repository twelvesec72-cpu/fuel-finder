<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fuel Finder" />
  <title>Fuel Finder</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    /* ── TOKENS ───────────────────────────────────────────────── */
    :root {
      --bg:        #0d0d0f;
      --surface:   #18181c;
      --surface2:  #222228;
      --border:    #2e2e38;
      --accent:    #f5a623;
      --accent2:   #e8870a;
      --danger:    #e05555;
      --ok:        #4caf7d;
      --text:      #f0eff4;
      --muted:     #8a8a9a;
      --radius:    12px;
      --panel-w:   340px;
      --header-h:  56px;
    }

    /* ── RESET ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── LAYOUT ───────────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100%; }

    #header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      z-index: 100;
      flex-shrink: 0;
    }

    #logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--accent);
      white-space: nowrap;
    }
    #logo span { color: var(--text); font-weight: 300; }

    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ── SLIDE PANEL ──────────────────────────────────────────── */
    #panel {
      position: absolute;
      top: 0; left: 0;
      width: var(--panel-w);
      max-width: 100%;
      height: 100%;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    }
    #panel.open { transform: translateX(0); }

    #panel-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 49;
    }
    #panel-overlay.visible { display: block; }

    #panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #panel-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

    #panel-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 16px; }

    /* ── TABS ─────────────────────────────────────────────────── */
    #tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 4px;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 4px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .tab-btn.active { background: var(--accent); color: #000; }

    /* ── SEARCH ───────────────────────────────────────────────── */
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .input-wrap input:focus { border-color: var(--accent); }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap .ico {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }

    /* ── ROUTE INPUTS ─────────────────────────────────────────── */
    #route-section { display: flex; flex-direction: column; gap: 8px; }
    .route-row { display: flex; align-items: center; gap: 8px; }
    .route-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .route-dot.start { background: var(--ok); }
    .route-dot.end   { background: var(--danger); }

    .route-row input {
      flex: 1;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .route-row input:focus { border-color: var(--accent); }
    .route-row input::placeholder { color: var(--muted); }

    #corridor-row { display: flex; align-items: center; justify-content: space-between; }
    #corridor-row label { font-size: 12px; color: var(--muted); }
    #corridor-row select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
    }

    /* ── BUTTONS ──────────────────────────────────────────────── */
    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:active { opacity: .75; }
    .btn-accent { background: var(--accent); color: #000; }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }

    /* ── RESULTS LIST ─────────────────────────────────────────── */
    #results { display: flex; flex-direction: column; gap: 6px; }
    .result-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .result-item:hover, .result-item.highlighted { border-color: var(--accent); background: #1f1f26; }
    .result-item.on-route { border-left: 3px solid var(--accent); }
    .result-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .result-meta { font-size: 12px; color: var(--muted); }
    .result-dist { font-size: 12px; color: var(--accent); font-weight: 600; float: right; }

    /* ── NEAREST BANNER ───────────────────────────────────────── */
    #nearest-banner {
      display: none;
      background: linear-gradient(135deg, #1c1a12, #1f1c0f);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px;
      cursor: pointer;
    }
    #nearest-banner.visible { display: block; }
    #nearest-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 4px; }
    #nearest-name { font-size: 15px; font-weight: 700; }
    #nearest-dist { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── FAB BUTTONS ──────────────────────────────────────────── */
    #fab-group {
      position: absolute;
      bottom: 24px; right: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 40;
    }
    .fab {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
      transition: transform .15s;
    }
    .fab:active { transform: scale(.92); }
    #fab-locate { background: var(--accent); color: #000; }
    #fab-menu   { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    /* ── STATUS BAR ───────────────────────────────────────────── */
    #status {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
      z-index: 40;
      white-space: nowrap;
      transition: opacity .3s;
      pointer-events: none;
    }
    #status.hidden { opacity: 0; }

    /* ── CLOSE BTN ────────────────────────────────────────────── */
    .close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }
    .close-btn:hover { color: var(--text); }

    /* ── EMPTY STATE ──────────────────────────────────────────── */
    .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 24px 0; }

    /* ── SCROLLBAR ────────────────────────────────────────────── */
    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── KML LOADER ───────────────────────────────────────────── */
    #kml-drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s;
    }
    #kml-drop-zone:hover, #kml-drop-zone.drag-over { border-color: var(--accent); color: var(--text); }
    #kml-drop-zone .drop-icon { font-size: 28px; margin-bottom: 8px; }
    #kml-status { font-size: 12px; color: var(--ok); text-align: center; }
    #kml-status.error { color: var(--danger); }

    /* ── GOOGLE MAPS INFO WINDOW OVERRIDE ─────────────────────── */
    .gm-style .gm-style-iw-c {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      box-shadow: 0 4px 24px rgba(0,0,0,.6) !important;
      padding: 0 !important;
    }
    .gm-style .gm-style-iw-d { overflow: hidden !important; padding: 0 !important; }
    .gm-style .gm-style-iw-t::after { background: var(--surface) !important; }
    .gm-style .gm-ui-hover-effect { display: none !important; }
    .info-win {
      padding: 14px 16px;
      min-width: 180px;
    }
    .info-win-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .info-win-dist { font-size: 12px; color: var(--accent); margin-bottom: 8px; }
    .info-win-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    @media (max-width: 400px) {
      :root { --panel-w: 100%; }
    }
  </style>
</head>
<body>
<div id="app">
  <header id="header">
    <div id="logo">⛽ Fuel<span>Finder</span></div>
    <div style="flex:1"></div>
    <div id="kml-status"></div>
  </header>

  <div id="map-wrap">
    <div id="map"></div>

    <!-- Slide Panel -->
    <div id="panel-overlay"></div>
    <div id="panel">
      <div id="panel-header">
        <span id="panel-title">Stations</span>
        <button class="close-btn" id="panel-close">✕</button>
      </div>
      <div id="panel-body">

        <!-- KML loader (shown until KML loaded) -->
        <div id="kml-section">
          <div id="kml-drop-zone" onclick="document.getElementById('kml-file-input').click()">
            <div class="drop-icon">📂</div>
            <div>Tap to load KML file</div>
            <div style="font-size:11px;margin-top:4px">or drop it here</div>
          </div>
          <input type="file" id="kml-file-input" accept=".kml,.kmz" style="display:none" />
        </div>

        <!-- Tabs (hidden until KML loaded) -->
        <div id="tabs" style="display:none">
          <button class="tab-btn active" data-tab="nearest">Nearest</button>
          <button class="tab-btn" data-tab="search">Search</button>
          <button class="tab-btn" data-tab="route">Route</button>
        </div>

        <!-- Nearest tab -->
        <div id="tab-nearest" class="tab-pane">
          <div id="nearest-banner">
            <div id="nearest-label">Closest Station</div>
            <div id="nearest-name">—</div>
            <div id="nearest-dist">—</div>
          </div>
          <div id="results-nearest" class="empty">Tap 📍 to find your location</div>
        </div>

        <!-- Search tab -->
        <div id="tab-search" class="tab-pane" style="display:none">
          <div class="input-wrap">
            <span class="ico">🔍</span>
            <input type="text" id="search-input" placeholder="Search stations…" autocomplete="off" />
          </div>
          <div id="results-search" class="empty">Load a KML file to search stations</div>
        </div>

        <!-- Route tab -->
        <div id="tab-route" class="tab-pane" style="display:none">
          <div id="route-section">
            <div class="route-row">
              <div class="route-dot start"></div>
              <input type="text" id="route-start" placeholder="Start (or use GPS)" />
            </div>
            <div class="route-row">
              <div class="route-dot end"></div>
              <input type="text" id="route-end" placeholder="Destination" />
            </div>
            <div id="corridor-row">
              <label>Highlight stations within</label>
              <select id="corridor-miles">
                <option value="5">5 mi</option>
                <option value="10" selected>10 mi</option>
                <option value="15">15 mi</option>
                <option value="25">25 mi</option>
                <option value="50">50 mi</option>
              </select>
            </div>
            <button class="btn btn-accent" id="route-go-btn">Get Route</button>
            <button class="btn btn-ghost" id="route-clear-btn" style="display:none">Clear Route</button>
          </div>
          <div id="results-route" class="empty">Enter a route to see nearby stations</div>
        </div>

      </div><!-- /panel-body -->
    </div><!-- /panel -->

    <!-- FABs -->
    <div id="fab-group">
      <button class="fab" id="fab-locate" title="My Location">📍</button>
      <button class="fab" id="fab-menu" title="Open Panel">☰</button>
    </div>

    <!-- Status pill -->
    <div id="status" class="hidden">Loading…</div>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const GOOGLE_MAPS_API_KEY = 'AIzaSyCGYMaGaZJ3Nsb-r-AmFZfp27_bHoibnhI';
const CORRIDOR_DEFAULT_MILES = 10;

// ─── STATE ─────────────────────────────────────────────────────────────────
let map, infoWindow, directionsService, directionsRenderer;
let userMarker = null;
let userLatLng = null;
let stations = [];          // { name, lat, lng, marker }
let routePolyline = null;
let routePath = [];         // array of LatLng along route
let activeTab = 'nearest';
let kmlLoaded = false;

// ─── UTILS ─────────────────────────────────────────────────────────────────
function haversineMiles(lat1, lng1, lat2, lng2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function fmtMiles(m) {
  if (m < 0.1) return `${Math.round(m * 5280)} ft`;
  return m < 10 ? `${m.toFixed(1)} mi` : `${Math.round(m)} mi`;
}

function showStatus(msg, ms = 2500) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.add('hidden'), ms);
}

// ─── MAP INIT ───────────────────────────────────────────────────────────────
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 39.5, lng: -98.35 },
    zoom: 5,
    mapTypeId: 'roadmap',
    disableDefaultUI: true,
    zoomControl: false,
    styles: darkMapStyle()
  });

  infoWindow = new google.maps.InfoWindow();
  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({
    suppressMarkers: true,
    polylineOptions: { strokeColor: '#f5a623', strokeWeight: 4, strokeOpacity: 0.85 }
  });
  directionsRenderer.setMap(map);

  setupEventListeners();
}

// ─── DARK MAP STYLE ─────────────────────────────────────────────────────────
function darkMapStyle() {
  return [
    { elementType: 'geometry', stylers: [{ color: '#1a1a1f' }] },
    { elementType: 'labels.text.fill', stylers: [{ color: '#8a8a9a' }] },
    { elementType: 'labels.text.stroke', stylers: [{ color: '#0d0d0f' }] },
    { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#2e2e3a' }] },
    { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#3a3a48' }] },
    { featureType: 'road.highway', elementType: 'labels.text.fill', stylers: [{ color: '#b0b0c0' }] },
    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0d1520' }] },
    { featureType: 'poi', stylers: [{ visibility: 'off' }] },
    { featureType: 'transit', stylers: [{ visibility: 'off' }] },
    { featureType: 'administrative', elementType: 'geometry', stylers: [{ color: '#2e2e3a' }] },
  ];
}

// ─── EVENT LISTENERS ────────────────────────────────────────────────────────
function setupEventListeners() {
  // Panel open/close
  document.getElementById('fab-menu').addEventListener('click', openPanel);
  document.getElementById('panel-close').addEventListener('click', closePanel);
  document.getElementById('panel-overlay').addEventListener('click', closePanel);

  // Locate
  document.getElementById('fab-locate').addEventListener('click', locateUser);

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Search
  document.getElementById('search-input').addEventListener('input', onSearch);

  // Route
  document.getElementById('route-go-btn').addEventListener('click', calcRoute);
  document.getElementById('route-clear-btn').addEventListener('click', clearRoute);

  // KML file input
  const kmlInput = document.getElementById('kml-file-input');
  kmlInput.addEventListener('change', e => loadKMLFile(e.target.files[0]));

  // Drag-and-drop KML
  const dropZone = document.getElementById('kml-drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadKMLFile(file);
  });
}

function openPanel() {
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('visible');
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('visible');
}

// ─── KML PARSER ─────────────────────────────────────────────────────────────
function loadKMLFile(file) {
  if (!file) return;
  const statusEl = document.getElementById('kml-status');
  statusEl.textContent = 'Loading…';
  statusEl.className = '';

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const xml = new DOMParser().parseFromString(e.target.result, 'text/xml');
      parseKML(xml);
    } catch(err) {
      statusEl.textContent = 'KML parse error';
      statusEl.className = 'error';
    }
  };
  reader.readAsText(file);
}

function parseKML(xml) {
  const statusEl = document.getElementById('kml-status');

  // Clear existing markers
  stations.forEach(s => s.marker.setMap(null));
  stations = [];

  const placemarks = xml.querySelectorAll('Placemark');
  placemarks.forEach(pm => {
    const nameEl = pm.querySelector('name');
    const coordEl = pm.querySelector('Point coordinates') || pm.querySelector('coordinates');
    if (!coordEl) return;

    const raw = coordEl.textContent.trim();
    const parts = raw.split(',');
    if (parts.length < 2) return;

    const lng = parseFloat(parts[0]);
    const lat = parseFloat(parts[1]);
    if (isNaN(lat) || isNaN(lng)) return;

    const name = nameEl ? nameEl.textContent.trim() : 'Fuel Station';
    const marker = createStationMarker(lat, lng, name);
    stations.push({ name, lat, lng, marker });
  });

  if (stations.length === 0) {
    statusEl.textContent = 'No stations found in KML';
    statusEl.className = 'error';
    return;
  }

  // Success — show tabs
  kmlLoaded = true;
  document.getElementById('kml-section').style.display = 'none';
  document.getElementById('tabs').style.display = 'flex';
  statusEl.textContent = `✓ ${stations.length} stations`;
  statusEl.className = '';

  // Fit map
  const bounds = new google.maps.LatLngBounds();
  stations.forEach(s => bounds.extend({ lat: s.lat, lng: s.lng }));
  map.fitBounds(bounds);

  // Auto-update nearest if we have location
  if (userLatLng) updateNearest();
  renderSearchResults('');

  showStatus(`${stations.length} stations loaded`);
}

// ─── STATION MARKER ─────────────────────────────────────────────────────────
function createStationMarker(lat, lng, name) {
  const marker = new google.maps.Marker({
    position: { lat, lng },
    map,
    title: name,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 7,
      fillColor: '#f5a623',
      fillOpacity: 0.9,
      strokeColor: '#0d0d0f',
      strokeWeight: 2
    },
    optimized: true
  });

  marker.addListener('click', () => {
    const dist = userLatLng
      ? `<div class="info-win-dist">${fmtMiles(haversineMiles(userLatLng.lat(), userLatLng.lng(), lat, lng))} from you</div>`
      : '';
    const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
    infoWindow.setContent(`
      <div class="info-win">
        <div class="info-win-name">${name}</div>
        ${dist}
        <a class="info-win-btn" href="${navUrl}" target="_blank">Navigate →</a>
      </div>
    `);
    infoWindow.open(map, marker);
  });

  return marker;
}

// ─── GPS / LOCATE ────────────────────────────────────────────────────────────
function locateUser() {
  if (!navigator.geolocation) { showStatus('GPS not available'); return; }
  showStatus('Finding location…', 8000);
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    userLatLng = new google.maps.LatLng(lat, lng);

    if (!userMarker) {
      userMarker = new google.maps.Marker({
        position: userLatLng,
        map,
        title: 'You',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 9,
          fillColor: '#4caf7d',
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 2.5
        },
        zIndex: 999
      });
    } else {
      userMarker.setPosition(userLatLng);
    }

    map.panTo(userLatLng);
    if (map.getZoom() < 10) map.setZoom(12);
    showStatus('Location found');

    if (kmlLoaded) updateNearest();
    if (activeTab === 'nearest') openPanel();
  }, err => {
    showStatus('Location denied');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

// ─── NEAREST ────────────────────────────────────────────────────────────────
function updateNearest() {
  if (!userLatLng || stations.length === 0) return;

  const ulat = userLatLng.lat(), ulng = userLatLng.lng();
  const sorted = [...stations].map(s => ({
    ...s, dist: haversineMiles(ulat, ulng, s.lat, s.lng)
  })).sort((a, b) => a.dist - b.dist);

  // Banner
  const nearest = sorted[0];
  document.getElementById('nearest-name').textContent = nearest.name;
  document.getElementById('nearest-dist').textContent = fmtMiles(nearest.dist) + ' away';
  const banner = document.getElementById('nearest-banner');
  banner.classList.add('visible');
  banner.onclick = () => {
    map.panTo({ lat: nearest.lat, lng: nearest.lng });
    map.setZoom(14);
    google.maps.event.trigger(nearest.marker, 'click');
    closePanel();
  };

  // List top 20
  const list = document.getElementById('results-nearest');
  list.innerHTML = '';
  list.className = '';
  sorted.slice(0, 20).forEach(s => {
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `
      <span class="result-dist">${fmtMiles(s.dist)}</span>
      <div class="result-name">${s.name}</div>
      <div class="result-meta">Tap to view on map</div>
    `;
    item.addEventListener('click', () => {
      map.panTo({ lat: s.lat, lng: s.lng });
      map.setZoom(14);
      google.maps.event.trigger(s.marker, 'click');
      closePanel();
    });
    list.appendChild(item);
  });
}

// ─── SEARCH ─────────────────────────────────────────────────────────────────
function onSearch(e) {
  renderSearchResults(e.target.value.trim().toLowerCase());
}

function renderSearchResults(query) {
  const list = document.getElementById('results-search');
  list.innerHTML = '';
  list.className = '';

  if (!kmlLoaded) {
    list.innerHTML = '<div class="empty">Load a KML file first</div>';
    return;
  }

  const filtered = query
    ? stations.filter(s => s.name.toLowerCase().includes(query))
    : stations;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">No stations match</div>';
    return;
  }

  // Sort by distance if we have location
  const ulat = userLatLng ? userLatLng.lat() : null;
  const ulng = userLatLng ? userLatLng.lng() : null;

  const sorted = filtered.map(s => ({
    ...s, dist: ulat ? haversineMiles(ulat, ulng, s.lat, s.lng) : null
  })).sort((a, b) => a.dist !== null ? a.dist - b.dist : 0);

  sorted.slice(0, 50).forEach(s => {
    const item = document.createElement('div');
    item.className = 'result-item';
    const distStr = s.dist !== null ? `<span class="result-dist">${fmtMiles(s.dist)}</span>` : '';
    item.innerHTML = `
      ${distStr}
      <div class="result-name">${s.name}</div>
    `;
    item.addEventListener('click', () => {
      map.panTo({ lat: s.lat, lng: s.lng });
      map.setZoom(14);
      google.maps.event.trigger(s.marker, 'click');
      closePanel();
    });
    list.appendChild(item);
  });
}

// ─── ROUTE ───────────────────────────────────────────────────────────────────
function calcRoute() {
  const startInput = document.getElementById('route-start').value.trim();
  const endInput = document.getElementById('route-end').value.trim();
  if (!endInput) { showStatus('Enter a destination'); return; }

  const origin = startInput || userLatLng;
  if (!origin) { showStatus('Enter a start or get GPS'); return; }

  showStatus('Calculating route…', 8000);

  directionsService.route({
    origin,
    destination: endInput,
    travelMode: google.maps.TravelMode.DRIVING
  }, (result, status) => {
    if (status !== 'OK') {
      showStatus('Route not found');
      return;
    }

    directionsRenderer.setDirections(result);

    // Sample points along route
    routePath = [];
    result.routes[0].legs.forEach(leg => {
      leg.steps.forEach(step => {
        step.path.forEach(pt => routePath.push(pt));
      });
    });

    const corridorMiles = parseFloat(document.getElementById('corridor-miles').value);
    highlightRouteStations(corridorMiles);
    document.getElementById('route-clear-btn').style.display = 'block';
    showStatus('Route loaded');
  });
}

function minDistToRouteMiles(lat, lng) {
  let min = Infinity;
  for (const pt of routePath) {
    const d = haversineMiles(lat, lng, pt.lat(), pt.lng());
    if (d < min) min = d;
  }
  return min;
}

function highlightRouteStations(corridorMiles) {
  const list = document.getElementById('results-route');
  list.innerHTML = '';
  list.className = '';

  const ulat = userLatLng ? userLatLng.lat() : null;
  const ulng = userLatLng ? userLatLng.lng() : null;

  const withDist = stations.map(s => ({
    ...s,
    routeDist: minDistToRouteMiles(s.lat, s.lng),
    userDist: ulat ? haversineMiles(ulat, ulng, s.lat, s.lng) : null
  }));

  // Reset all markers
  stations.forEach(s => {
    s.marker.setIcon({
      path: google.maps.SymbolPath.CIRCLE,
      scale: 7,
      fillColor: '#f5a623',
      fillOpacity: 0.9,
      strokeColor: '#0d0d0f',
      strokeWeight: 2
    });
  });

  const nearRoute = withDist.filter(s => s.routeDist <= corridorMiles)
    .sort((a, b) => a.routeDist - b.routeDist);

  // Highlight near-route markers
  nearRoute.forEach(s => {
    s.marker.setIcon({
      path: google.maps.SymbolPath.CIRCLE,
      scale: 9,
      fillColor: '#f5a623',
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 2.5
    });
    s.marker.setZIndex(100);
  });

  if (nearRoute.length === 0) {
    list.innerHTML = `<div class="empty">No stations within ${corridorMiles} mi of route</div>`;
    return;
  }

  nearRoute.forEach(s => {
    const item = document.createElement('div');
    item.className = 'result-item on-route';
    const distStr = s.userDist !== null
      ? `<span class="result-dist">${fmtMiles(s.userDist)} from you</span>` : '';
    item.innerHTML = `
      ${distStr}
      <div class="result-name">${s.name}</div>
      <div class="result-meta">${fmtMiles(s.routeDist)} off route</div>
    `;
    item.addEventListener('click', () => {
      map.panTo({ lat: s.lat, lng: s.lng });
      map.setZoom(14);
      google.maps.event.trigger(s.marker, 'click');
      closePanel();
    });
    list.appendChild(item);
  });
}

function clearRoute() {
  directionsRenderer.setDirections({ routes: [] });
  routePath = [];
  // Reset markers
  stations.forEach(s => {
    s.marker.setIcon({
      path: google.maps.SymbolPath.CIRCLE,
      scale: 7,
      fillColor: '#f5a623',
      fillOpacity: 0.9,
      strokeColor: '#0d0d0f',
      strokeWeight: 2
    });
    s.marker.setZIndex(undefined);
  });
  document.getElementById('results-route').innerHTML = '<div class="empty">Enter a route to see nearby stations</div>';
  document.getElementById('route-clear-btn').style.display = 'none';
  showStatus('Route cleared');
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('tab-nearest').style.display = tab === 'nearest' ? 'flex' : 'none';
  document.getElementById('tab-nearest').style.flexDirection = 'column';
  document.getElementById('tab-nearest').style.gap = '10px';
  document.getElementById('tab-search').style.display = tab === 'search' ? 'flex' : 'none';
  document.getElementById('tab-search').style.flexDirection = 'column';
  document.getElementById('tab-search').style.gap = '10px';
  document.getElementById('tab-route').style.display = tab === 'route' ? 'flex' : 'none';
  document.getElementById('tab-route').style.flexDirection = 'column';
  document.getElementById('tab-route').style.gap = '10px';
}
